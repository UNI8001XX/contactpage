<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hi there, You made it!🙏 my name is Doron Zaccai and great meeting you here!💖 </title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2589/2589175.png" type="image/x-icon">
    <style>
        :root { --primary: #ff4b2b; --secondary: #ff416c; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; color: #333; }
        .card { background: rgba(255, 255, 255, 0.95); padding: 40px 30px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); text-align: center; width: 90%; max-width: 350px; backdrop-filter: blur(10px); }
        h1 { font-size: 24px; margin-bottom: 10px; color: #1a1a1a; }
        p { font-size: 16px; line-height: 1.5; color: #555; margin-bottom: 25px; }
        .audio-container { background: #f0f0f5; padding: 20px; border-radius: 15px; margin-bottom: 25px; }
        audio { width: 100%; }
        .btn { display: block; background: linear-gradient(to right, var(--primary), var(--secondary)); color: white; padding: 16px; text-decoration: none; border-radius: 12px; font-weight: bold; font-size: 18px; transition: transform 0.2s; box-shadow: 0 4px 15px rgba(255, 75, 43, 0.3); }
        .btn:active { transform: scale(0.96); }
        .tag { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--primary); font-weight: bold; margin-bottom: 8px; display: block; }
    </style>
</head>
<body>
    <div class="card">
        <span class="tag">Exclusive Message</span>
        <h1>Hi! I'm the guy from the app.</h1>
        <p>I built this little page because I believe real connections shouldn't be trapped behind a subscription wall.</p>
        
        <div class="audio-container">
            <p style="margin-bottom: 10px; font-weight: bold;">Listen to my voice note:</p>
            <audio controls>
                <source src="hello.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
        </div>

        <a href="https://wa.me/YOUR_PHONE_NUMBER_HERE" class="btn">Say Hi on WhatsApp</a>
        <p style="font-size: 11px; margin-top: 20px; color: #888;">(Or just reply on the app if you prefer!)</p>
    </div>
</body>
</html>
